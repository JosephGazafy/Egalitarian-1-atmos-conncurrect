<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Omega UDF Thought Hub</title>
<style>
body{margin:0;background:#060913;color:#eaf0ff;font-family:system-ui,sans-serif}
header{padding:24px;border-bottom:1px solid #26314d;background:#0b1020}
h1{margin:0;color:#7df9ff}
main{padding:24px;display:grid;gap:18px;max-width:1100px;margin:auto}
.card{background:#111827;border:1px solid #26314d;border-radius:16px;padding:18px}
.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:12px}
label{font-size:12px;color:#9aa8c7;text-transform:uppercase;letter-spacing:.08em}
textarea,input{width:100%;box-sizing:border-box;margin-top:6px;background:#05070d;color:#eaf0ff;border:1px solid #334155;border-radius:10px;padding:10px}
button{background:#7df9ff;color:#061018;border:0;border-radius:10px;padding:12px 16px;font-weight:800;cursor:pointer}
button.secondary{background:#1f2937;color:#eaf0ff;border:1px solid #334155}
pre{white-space:pre-wrap;background:#05070d;border:1px solid #334155;border-radius:12px;padding:14px;overflow:auto}
.row{display:flex;gap:10px;flex-wrap:wrap}
</style>
</head>
<body>
<header>
<h1>Ω UDF Thought Hub</h1>
<p>A → B → C → X → P → Q → R thought integration controller</p>
</header>

<main>
<section class="card">
<div class="grid">
<div><label>A — Assertion</label><textarea id="A"></textarea></div>
<div><label>B — Basis</label><textarea id="B"></textarea></div>
<div><label>C — Constraint</label><textarea id="C"></textarea></div>
<div><label>X — Transformation</label><textarea id="X"></textarea></div>
<div><label>P — Process</label><textarea id="P"></textarea></div>
<div><label>Q — Question</label><textarea id="Q"></textarea></div>
<div><label>R — Resolution</label><textarea id="R"></textarea></div>
</div>
<br>
<div class="row">
<button onclick="generate()">Generate Ω Output</button>
<button class="secondary" onclick="downloadJSON()">Export JSON</button>
<button class="secondary" onclick="downloadTXT()">Export TXT</button>
<button class="secondary" onclick="downloadMD()">Export Markdown</button>
<button class="secondary" onclick="clearAll()">Clear</button>
</div>
</section>

<section class="card">
<h2>Ω Equation</h2>
<pre id="equation">Awaiting input...</pre>
</section>

<section class="card">
<h2>Ω Synthesis</h2>
<pre id="synthesis">Awaiting input...</pre>
</section>

<section class="card">
<h2>Ω Logic Tree</h2>
<pre id="tree">Awaiting input...</pre>
</section>
</main>

<script>
function val(id){return document.getElementById(id).value.trim() || `[empty ${id}]`}

function state(){
  return {
    timestamp:new Date().toISOString(),
    A:val("A"), B:val("B"), C:val("C"),
    X:val("X"), P:val("P"), Q:val("Q"), R:val("R")
  }
}

function makeOutputs(s){
  const equation =
`Ω = ((A[${s.A}] + B[${s.B}]) - C[${s.C}]) × X[${s.X}] → P[${s.P}] ? Q[${s.Q}] ⇒ R[${s.R}]`;

  const synthesis =
`My current thought begins as "${s.A}".
It is supported by "${s.B}".
It is limited by "${s.C}".
It transforms through "${s.X}".
It processes by "${s.P}".
It is tested by the question "${s.Q}".
It resolves into "${s.R}".`;

  const tree =
`OMEGA UDF THOUGHT INTEGRATION TREE

ROOT: CURRENT THOUGHT
│
├── A : ASSERTION
│   └── ${s.A}
│
├── B : BASIS
│   └── ${s.B}
│
├── C : CONSTRAINT
│   └── ${s.C}
│
├── X : TRANSFORMATION
│   └── ${s.X}
│
├── P : PROCESS
│   └── ${s.P}
│
├── Q : QUESTION
│   └── ${s.Q}
│
└── R : RESOLUTION
    └── ${s.R}`;

  return {equation,synthesis,tree}
}

function generate(){
  const s=state(), o=makeOutputs(s)
  document.getElementById("equation").textContent=o.equation
  document.getElementById("synthesis").textContent=o.synthesis
  document.getElementById("tree").textContent=o.tree
  return {...s,...o}
}

function download(name, text, type){
  const blob=new Blob([text],{type})
  const a=document.createElement("a")
  a.href=URL.createObjectURL(blob)
  a.download=name
  a.click()
  URL.revokeObjectURL(a.href)
}

function stamp(){return new Date().toISOString().replace(/[:.]/g,"-")}

function downloadJSON(){
  const o=generate()
  download(`omega_thought_${stamp()}.json`, JSON.stringify(o,null,2), "application/json")
}

function downloadTXT(){
  const o=generate()
  download(`omega_thought_${stamp()}.txt`,
`OMEGA UDF THOUGHT OUTPUT

A=${o.A}
B=${o.B}
C=${o.C}
X=${o.X}
P=${o.P}
Q=${o.Q}
R=${o.R}

EQUATION:
${o.equation}

SYNTHESIS:
${o.synthesis}

TREE:
${o.tree}`, "text/plain")
}

function downloadMD(){
  const o=generate()
  download(`omega_thought_${stamp()}.md`,
`# Omega UDF Thought Output

Generated: ${o.timestamp}

## Variables

- **A:** ${o.A}
- **B:** ${o.B}
- **C:** ${o.C}
- **X:** ${o.X}
- **P:** ${o.P}
- **Q:** ${o.Q}
- **R:** ${o.R}

## Equation

\`\`\`text
${o.equation}
\`\`\`

## Synthesis

${o.synthesis}

## Logic Tree

\`\`\`text
${o.tree}
\`\`\`
`, "text/markdown")
}

function clearAll(){
  ["A","B","C","X","P","Q","R"].forEach(id=>document.getElementById(id).value="")
  document.getElementById("equation").textContent="Awaiting input..."
  document.getElementById("synthesis").textContent="Awaiting input..."
  document.getElementById("tree").textContent="Awaiting input..."
}
</script>
</body>
</html>
